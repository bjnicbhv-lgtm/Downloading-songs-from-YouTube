name: "Downloading songs from YouTube with filtering"
on:
  workflow_dispatch:
    inputs:
      yt_urls:
        description: 'הדבק קישור אחד או כמה (מופרדים ברווח)'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    container:
      image: jauderho/yt-dlp:latest
    permissions: write-all
    steps:
      - name: 1. Download Content
        run: |
          mkdir -p yt_output
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          
          for url in ${{ github.event.inputs.yt_urls }}; do
            if [ "${{ github.event.inputs.format }}" = "mp3" ]; then
              yt-dlp --cookies cookies.txt -x --audio-format mp3 --embed-thumbnail --add-metadata -o "%(title)s.%(ext)s" --paths "yt_output" "$url"
            else
              yt-dlp --cookies cookies.txt -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 --embed-thumbnail --add-metadata -o "%(title)s.%(ext)s" --paths "yt_output" "$url"
            fi
          done
          rm cookies.txt

      - name: 2. Process Output (Smart Upload)
        id: process
        run: |
          COUNT=$(ls -1 yt_output | wc -l)
          if [ "$COUNT" -gt 1 ]; then
            apk add zip
            zip -r "final_output.zip" yt_output/
            echo "path=final_output.zip" >> $GITHUB_OUTPUT
            echo "type=חבילת קבצים" >> $GITHUB_OUTPUT
          else
            # מעביר את הקובץ הבודד לתיקייה הראשית כדי שה-Release יוכל למצוא אותו בקלות
            FILE_NAME=$(ls yt_output)
            mv "yt_output/$FILE_NAME" .
            echo "path=$FILE_NAME" >> $GITHUB_OUTPUT
            echo "type=קובץ בודד" >> $GITHUB_OUTPUT
          fi

      - name: 3. Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "${{ steps.process.outputs.path }}"
          tag: "run-${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: |
            **שם התוכנה:** Downloading songs from YouTube with filtering
            **סוג הורדה:** ${{ steps.process.outputs.type }}
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          removeArtifacts: true
