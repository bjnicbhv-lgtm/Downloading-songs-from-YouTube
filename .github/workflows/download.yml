name: "YouTube Specialist PRO"
on:
  workflow_dispatch:
    inputs:
      yt_url:
        description: 'קישור ליוטיוב'
        required: true
      format:
        description: 'mp3 או mp4'
        default: 'mp3'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    container:
      image: jauderho/yt-dlp:latest
    permissions: write-all
    steps:
      - name: 1. Download and Embed Metadata
        id: download_step
        run: |
          URL="${{ github.event.inputs.yt_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          mkdir -p yt_output
          
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          
          # הורדה עם שם קובץ תואם ליוטיוב והטמעת מידע
          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp --cookies cookies.txt \
              -x --audio-format mp3 \
              --embed-thumbnail \
              --add-metadata \
              -o "%(title)s.%(ext)s" \
              --paths "yt_output" \
              "$URL"
          else
            yt-dlp --cookies cookies.txt \
              -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" \
              --merge-output-format mp4 \
              --embed-thumbnail \
              --add-metadata \
              -o "%(title)s.%(ext)s" \
              --paths "yt_output" \
              "$URL"
          fi
          
          rm cookies.txt

      - name: 2. Create Numbered Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "yt_output/*"
          tag: "run-${{ github.run_number }}"
          name: "הורדה מספר ${{ github.run_number }}"
          body: |
            **הקובץ כולל תמונה ומטא-דאטה מוטמעים**
            שם השיר חולץ אוטומטית מיוטיוב.
          token: ${{ secrets.GITHUB_TOKEN }}
