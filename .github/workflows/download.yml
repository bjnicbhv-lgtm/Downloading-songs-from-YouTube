name: "YouTube Specialist PRO"
on:
  workflow_dispatch:
    inputs:
      yt_url:
        description: 'קישור ליוטיוב'
        required: true
      format:
        description: 'mp4 או mp3'
        default: 'mp4'
        required: true

jobs:
  youtube_job:
    runs-on: ubuntu-latest
    container:
      image: jauderho/yt-dlp:latest
    permissions: write-all
    steps:
      - name: 1. Download Video, Thumbnail and Metadata
        id: download_step
        run: |
          URL="${{ github.event.inputs.yt_url }}"
          FORMAT="${{ github.event.inputs.format }}"
          mkdir -p yt_output
          mkdir -p final_zip
          
          echo "${{ secrets.YT_COOKIES }}" > cookies.txt
          
          # חילוץ שם הסרטון
          VIDEO_TITLE=$(yt-dlp --cookies cookies.txt --get-filename -o "%(title)s" "$URL")
          
          # פקודת בסיס להורדת תמונה ומטא-דאטה
          COMMON_OPTS="--cookies cookies.txt --write-thumbnail --write-info-json --add-metadata"
          
          if [ "$FORMAT" = "mp3" ]; then
            yt-dlp $COMMON_OPTS -x --audio-format mp3 -o "yt_output/%(title)s.%(ext)s" "$URL"
          else
            yt-dlp $COMMON_OPTS -f "bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best" --merge-output-format mp4 -o "yt_output/%(title)s.%(ext)s" "$URL"
          fi
          
          apk add zip
          cd yt_output
          zip -r "../final_zip/${VIDEO_TITLE}_with_metadata.zip" .
          cd ..
          
          rm cookies.txt

      - name: 2. Create Numbered Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "final_zip/*.zip"
          tag: "run-${{ github.run_number }}"
          name: "הורדה מלאה מספר ${{ github.run_number }}"
          body: |
            **הורדה הכוללת תמונה ומטא-דאטה**
            **קישור:** ${{ github.event.inputs.yt_url }}
          token: ${{ secrets.GITHUB_TOKEN }}
